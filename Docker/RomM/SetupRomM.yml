# Run with
# ansible-playbook SetupRomM.yml
# https://romm.app/

---
- name: Setup RomM
  hosts: all
  tasks:

  - name: Create directory for data
    file:
      path: "{{ item }}"
      state: directory
      owner: ajorians
      group: users
      mode: 0777
    loop:
      - /opt/DockerSwarmData/romm
      - /opt/DockerSwarmData/romm/library
      - /opt/DockerSwarmData/romm/assets
      - /opt/DockerSwarmData/romm/config
      - /root/docker
      - /root/docker/romm

  - name: Copy the docker-compose file with owner and permissions
    ansible.builtin.copy:
      src: docker-compose.yml
      dest: /root/docker/romm
      owner: ajorians
      group: users
      mode: 0777

  - name: Deploy RomM from a compose file
    community.docker.docker_compose_v2:
      project_src: /root/docker/romm

  - name: Make Apache VHost file
    ansible.builtin.copy:
      dest: /etc/apache2/vhosts.d/romm.conf
      force: false
      content: |
        <VirtualHost *:80>
          ServerName romm.orians.org
          ServerAlias romm.stage.orians.org romm
          ProxyPass / http://127.0.0.1:3001/
          ProxyPassReverse / http://127.0.0.1:3001/
        </VirtualHost>
    when:
    - ansible_facts['distribution'].find("openSUSE") != -1
#    notify:
#    - Restart Apache2 service

  - name: Make Apache VHost file
    ansible.builtin.copy:
      dest: /etc/apache2/sites-available/romm.conf
      force: false
      content: |
        <VirtualHost *:80>
          ServerName romm.orians.org
          ServerAlias romm.stage.orians.org gitea
          ProxyPass / http://127.0.0.1:3001/
          ProxyPassReverse / http://127.0.0.1:3001/
        </VirtualHost>
    when:
    - ansible_facts['distribution'].find("openSUSE") == -1
#    notify:
#    - Restart Apache2 service

